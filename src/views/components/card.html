<article class="card">
  <picture>
    <source
      srcset="{{ image }}?as=webp&width=375"
      type="image/webp"
    />
    <img
      class="card__image"
      src="{{ image }}?width=375"
      alt="{{ alt }}"
    />
  </picture>
  <div class="card__text">
    <h3>{{ title }}</h3>
    <p>{{ text }}</p>
    <a href="{{ href }}" target="_blank" class="card__link" data-preview-key="{{ preview }}">Conèixer més →</a>
  </div>
</article>
